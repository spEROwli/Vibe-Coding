name: Daily PM Role Scrape

on:
  schedule:
    - cron: '30 11 * * *'  # 7:30am ET (UTC-4 summer) / 6:30am ET (UTC-5 winter)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        continue-on-error: true   # ATS pipeline must never fail on a Node/CLI hiccup
        with:
          node-version: '20'

      - name: Install dependencies
        run: pip install google-api-python-client google-auth-oauthlib

      - name: Install Bright Data CLI
        continue-on-error: true   # brightdata is optional; if install fails, fetch_brightdata stays inert (shutil.which guard) and ATS still publishes
        run: npm install -g @brightdata/cli

      - name: Write Adzuna credentials
        run: |
          echo "${{ secrets.ADZUNA_APP_ID }}" > adzuna_key.txt
          echo "${{ secrets.ADZUNA_APP_KEY }}" >> adzuna_key.txt

      - name: Write Bright Data credentials
        # 3 lines: api_key / collector_id / search_url (mirrors the ADZUNA_* pattern).
        # Unset secrets write blank lines; _load_brightdata_creds treats blank as
        # missing, so the source stays inert until SOURCES["brightdata"]=True is
        # committed AND all three secrets exist. No spend until both are true.
        run: |
          echo "${{ secrets.BRIGHTDATA_API_KEY }}" > brightdata_key.txt
          echo "${{ secrets.BRIGHTDATA_COLLECTOR_ID }}" >> brightdata_key.txt
          echo "${{ secrets.BRIGHTDATA_SEARCH_URL }}" >> brightdata_key.txt

      - name: Run scraper
        run: python3 pmfarm.py

      - name: Build HTML
        run: python3 build_page.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pm_roles.html pm_roles.csv
          git diff --cached --quiet && echo "No changes" || { git commit -m "daily update $(date -u +%Y-%m-%d)" && git pull --rebase origin main && git push; }
